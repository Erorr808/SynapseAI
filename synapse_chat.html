
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynapseAI Chat</title>
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="chat-ui.css">
    <link rel="stylesheet" href="buttons.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="typography.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .chat-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 8px;
        }

        .chat-status {
          font-size: 11px;
          color: #9ca3af;
        }

        .chat-subheader {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 6px;
          font-size: 11px;
          color: #9ca3af;
        }

        .pill {
          padding: 3px 8px;
          border-radius: 999px;
          border: 1px solid #1f2937;
          background: rgba(15, 23, 42, 0.8);
        }

        .chat-tabs {
          display: flex;
          gap: 6px;
          margin-bottom: 8px;
        }

        .chat-tab {
          padding: 4px 10px;
          border-radius: 999px;
          border: 1px solid #1f2937;
          background: rgba(15, 23, 42, 0.7);
          color: #9ca3af;
          font-size: 11px;
        }

        .chat-tab.active {
          background: linear-gradient(135deg, #0ea5e9, #6366f1);
          color: #f9fafb;
          border-color: transparent;
        }

        #chat-form {
          display: flex;
          gap: 8px;
          margin-top: 4px;
        }

        #user-input {
          flex: 1;
          padding: 10px 11px;
          border-radius: 999px;
          border: 1px solid #1f2937;
          background: #020617;
          color: #e5e7eb;
          font-size: 14px;
        }

        #user-input::placeholder {
          color: #6b7280;
        }

        #user-input:focus {
          outline: none;
          border-color: #38bdf8;
          box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.35);
        }

        .hint {
          margin-top: 6px;
          font-size: 11px;
          color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="chat-shell">
        <div class="chat-header">
            <div class="chat-title">SynapseAI Chat</div>
            <div class="chat-status" id="model-status">Loading Mastermind...</div>
        </div>

        <div class="chat-subheader">
            <div class="pill">Engine: SynapseAI Mastermind</div>
            <div class="pill" id="bridge-status">AllBridge: initializing...</div>
        </div>

        <div class="chat-tabs">
            <button class="chat-tab active" type="button">Chat</button>
            <button class="chat-tab" type="button">Images</button>
            <button class="chat-tab" type="button">Videos</button>
        </div>

        <div id="chat-window"></div>

        <form id="chat-form">
            <input type="text" id="user-input" placeholder="Ask SynapseAI anything..." autocomplete="off">
            <button type="submit">
                <span>Send</span>
            </button>
        </form>

        <div class="hint">
            Powered by your in-browser <code>SynapseAI</code> Mastermind. To route through a remote LLM,
            open <code>synapse_config.js</code> and add your API key.
        </div>
    </div>

    <script src="synapse_config.js"></script>
    <script src="Mastermind.js"></script>
    <script src="synapse_chat.js"></script>
    <script src="AllBrige.js"></script>
</body>
</html>
